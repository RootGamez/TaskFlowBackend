services:
  postgres:
    image: postgres:15
    container_name: taskflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: taskflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: taskflow_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio_init:
    image: minio/mc:latest
    container_name: taskflow_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/taskflow-media || true;
      mc anonymous set none local/taskflow-media || true;
      exit 0;
      "

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
      - minio_init
    environment:
      DJANGO_ENV: dev
      DJANGO_SECRET_KEY: change-me
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: postgres
      DB_NAME: taskflow
      DB_USER: taskflow
      DB_PASSWORD: taskflow
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      ACCESS_TOKEN_LIFETIME_MINUTES: "15"
      REFRESH_TOKEN_LIFETIME_DAYS: "7"
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: taskflow-media
      MINIO_USE_SSL: "False"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: python manage.py runserver 0.0.0.0:8000

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow_celery_worker
    restart: unless-stopped
    depends_on:
      - backend
      - redis
    environment:
      DJANGO_ENV: dev
      DJANGO_SECRET_KEY: change-me
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: postgres
      DB_NAME: taskflow
      DB_USER: taskflow
      DB_PASSWORD: taskflow
      DB_HOST: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: taskflow-media
      MINIO_USE_SSL: "False"
    volumes:
      - .:/app
    command: celery -A config worker -l info

volumes:
  postgres_data:
  minio_data:
